version: 0.5.0

# Chemin du graph Logseq (écrit par install.sh, ou configurer manuellement)
graph_path: /Users/phil/Autosync/genWtao

# Types valides (les 4 comportements possibles dans type::)
valid_types:
  - page
  - article
  - collection
  - form

# Rétrocompatibilité v0.4 : anciens type:: → menu:: + type::
# Si une page utilise l'ancien modèle (type:: cv au lieu de type:: page + menu:: cv)
# ce mapping traduit l'ancien type en section Hugo
legacy_sections:
    home: ""
    cv: cv
    post: blog
    blog: blog
    curious: curious
    contact: contact
    project: project

# Logseq internal keys to strip from content
logseq_internal_keys:
  - collapsed
  - id
  - background-color
  - heading
  - card-last-reviewed
  - card-next-schedule
  - card-last-score
  - card-ease-factor
  - card-repeats
  - card-last-interval
  - logseq.order-list-type

# Active Hugo theme and theme-specific front matter param mapping
# To switch themes, update the right-hand values only.
theme: papermod
theme_params:
    toc: ShowToc
    toc_open: TocOpen
    show_tags: ShowTags

# Theme colors - generates site/static/css/theme-colors.css
colors:
    light:
        background:    "rgb(255, 255, 255)"
        surface:       "rgb(255, 255, 255)"
        text_primary:  "rgb(30, 30, 30)"
        text_secondary: "rgb(108, 108, 108)"
        text_content:  "rgb(44, 44, 44)"
        surface_muted: "rgb(214, 214, 214)"
        code_bg:       "rgb(245, 245, 245)"
        code_block_bg: "rgb(28, 29, 33)"
        border:        "rgb(238, 238, 238)"
    dark:
        background:    "rgb(29, 30, 32)"
        surface:       "rgb(46, 46, 51)"
        text_primary:  "rgb(218, 218, 219)"
        text_secondary: "rgb(155, 156, 157)"
        text_content:  "rgb(196, 196, 197)"
        surface_muted: "rgb(65, 66, 68)"
        code_bg:       "rgb(55, 56, 62)"
        code_block_bg: "rgb(46, 46, 51)"
        border:        "rgb(51, 51, 51)"

# Color variable mapping - semantic name -> CSS variable for active theme
# Switching themes = update this mapping only.
color_vars:
    background:    "--theme"
    surface:       "--entry"
    text_primary:  "--primary"
    text_secondary: "--secondary"
    text_content:  "--content"
    surface_muted: "--tertiary"
    code_bg:       "--code-bg"
    code_block_bg: "--hljs-bg"
    border:        "--border"