name: Generate and Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [graph-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout genWtao-app
        uses: actions/checkout@v4
        with:
          path: genWtao-app
          submodules: true

      - name: Checkout genWtao-graph
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GRAPH_REPO }}
          token: ${{ secrets.GH_TOKEN }}
          path: genWtao-graph

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Restore config
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_YAML }}
        run: printf '%s\n' "$CONFIG_CONTENT" > genWtao-app/config/config.yaml

      - name: Export Logseq to Hugo
        run: |
          python3 genWtao-app/scripts/logseq_to_hugo.py \
            --graph  genWtao-graph \
            --output genWtao-app/site/content \
            --config genWtao-app/config/config.yaml \
            --clean

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: false

      - name: Build Hugo
        env:
          HUGO_PARAMS_CONTACT_FORM_ID: ${{ secrets.CONTACT_FORM_ID }}
        run: |
          cd genWtao-app/site
          hugo --minify

      - name: Read hosting config
        id: hosting
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import sys
          import yaml

          with open('genWtao-app/config/config.yaml', encoding='utf-8') as handle:
              cfg = yaml.safe_load(handle) or {}

          hosting = cfg.get('hosting', {})
          ftp = hosting.get('ftp', {})

          missing = []
          if not hosting.get('site_url'):
            missing.append('hosting.site_url')
          if not ftp.get('host'):
            missing.append('hosting.ftp.host')
          if not ftp.get('user'):
            missing.append('hosting.ftp.user')

          if missing:
            print(f"Missing required config.yaml values: {', '.join(missing)}", file=sys.stderr)
            sys.exit(1)

          print(f"site_url={hosting.get('site_url', '')}")
          print(f"ftp_host={ftp.get('host', '')}")
          print(f"ftp_user={ftp.get('user', '')}")
          print(f"ftp_port={ftp.get('port', 21)}")
          print(f"ftp_remote={ftp.get('remote_path', '/htdocs').rstrip('/')}/")
          PY

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.hosting.outputs.ftp_host }}
          username: ${{ steps.hosting.outputs.ftp_user }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ steps.hosting.outputs.ftp_port }}
          protocol: ftp
          local-dir: ./genWtao-app/site/public/
          server-dir: ${{ steps.hosting.outputs.ftp_remote }}
          log-level: verbose

      - name: Summary
        if: success()
        run: |
          echo "Site deployed successfully"
          echo "${{ steps.hosting.outputs.site_url }}"

      - name: Error details
        if: failure()
        run: echo "Deployment failed — check logs above"
